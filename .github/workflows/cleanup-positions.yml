name: Cleanup Expired Positions

on:
  workflow_dispatch:
  schedule:
    # Run daily at 4 PM ET (8 PM UTC)
    - cron: '0 20 * * *'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run cleanup script
      env:
        DATABASE_URL: sqlite:///trading_multi.db
      run: |
        echo "Running position cleanup..."
        python maintenance/cleanup_expired_positions.py
    
    - name: Upload database if changed
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: cleaned-database
        path: trading_multi.db
        retention-days: 7