name: Manual Position Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run cleanup script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        echo "Running position cleanup..."
        python fix_github_positions.py
        echo "Cleanup complete!"
    
    - name: Show database status
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python3 << 'EOF'
        import sqlite3
        import os
        db_url = os.environ.get('DATABASE_URL', 'sqlite:///trading_multi.db')
        db_path = db_url.replace('sqlite:///', '') if db_url.startswith('sqlite:///') else 'trading_multi.db'
        if os.path.exists(db_path):
            conn = sqlite3.connect(db_path)
            cursor = conn.cursor()
            cursor.execute('SELECT COUNT(*) FROM option_trades WHERE status="OPEN"')
            open_count = cursor.fetchone()[0]
            print(f'Open positions remaining: {open_count}')
            if open_count > 0:
                cursor.execute('SELECT contract_symbol, bot_id FROM option_trades WHERE status="OPEN"')
                for row in cursor.fetchall():
                    print(f'  - {row[0]} (bot: {row[1]})')
            conn.close()
        else:
            print('Database not found')
        EOF